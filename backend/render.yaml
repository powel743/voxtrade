services:
  - type: web
    name: voxtrade-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MT5_BRIDGE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "7"
      - key: SYMBOL
        value: "XAUUSDm"
      - key: MONGODB_DB
        value: "voxtrade"
      - key: PORT
        value: "3001"
